{% extends "layout/base.html" %}
{% block content %}
<div class="main-content">
    <div class="container-fluid mt-4 ps-4 pe-4">
        <h2 class="mb-3" id="sis-title">
            🏨 SIS
            <span id="sis-meta" style="font-size: 18px;" data-control='{{ control_anual | tojson | safe }}'>
            </span>
        </h2>



        <!-- GRÁFICAS -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="text-muted mb-2">Total Consultas</h6>
                        <canvas id="graficaSisPorAnio"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="text-muted mb-2" id="tituloGraficaSis">Estudios de Gabinete</h6>
                        <canvas id="graficaSis"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card">

            <div class="card-body">
                <!-- 🔹 PESTAÑAS POR AÑO -->
                <ul class="nav nav-tabs mb-3" id="tabsAnios"></ul>
                <div class="table-responsive">
                    <table class="table table-striped table-sm" id="tablaResultados">
                        <thead>
                            <tr>
                                <th>Año</th>
                                <th>CLUES</th>
                                <th>Unidad</th>
                                <th>Consultas</th>
                                <th>Especialidad</th>
                                <th>Mental</th>
                                <th>Bucal</th>
                                <th>Medicas</th>
                                <th>Días Paciente</th>
                                <th>No Médicas</th>
                            </tr>
                        </thead>
                        <tbody id="tablaSIS"></tbody>

                    </table>
                </div>
                <!-- 🔹 PAGINACIÓN -->
                <nav class="mt-2">
                    <ul class="pagination pagination-sm" id="paginacionTabla"></ul>
                </nav>

                <!-- =======================
                        GRAFICA MENSUAL SIS
                    ======================== -->

                <hr>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="mb-0">📈 Total SIS mensual</h5>

                            <!-- SOLO PARA CONSULTAS -->
                            <select id="filtroSisDetalle" class="form-select form-select-sm w-auto mb-2">
                            </select>
                        </div>

                        <div style="height:350px">
                            <canvas id="graficaSisMensual"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    const controlAnual = JSON.parse(
        document.getElementById("sis-meta").dataset.control || "[]"
    );


    function formatearFechaES(fechaStr) {
        if (!fechaStr) return "";

        let fecha;


        if (fechaStr.includes("-")) {
            const [y, m, d] = fechaStr.split("-");
            fecha = new Date(Date.UTC(y, m - 1, d));
        }

        else {
            fecha = new Date(fechaStr);
        }

        const meses = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        return `${fecha.getUTCDate()} de ${meses[fecha.getUTCMonth()]} de ${fecha.getUTCFullYear()}`;
    }


    function actualizarEncabezadoSIS(anio) {
        const meta = document.getElementById("sis-meta");

        const registro = controlAnual.find(r => r.anio === anio);

        if (!registro) {
            meta.textContent = "";
            return;
        }

        meta.textContent =
            ` | ${registro.estatus_inicio} al ${formatearFechaES(registro.fecha_actualizacion)} · ${registro.estatus}`;
    }

</script>



<script>
    /* ===============================
       DATA INICIAL
    ================================*/
    const sisResultados = JSON.parse('{{ resultados | tojson | safe }}');
    const FILAS_POR_PAGINA = 10;

    let datosActuales = [];
    let paginaActual = 1;
    let anioActivo = null;

    let graficaAnio = null;
    let graficaUnidad = null;
    let graficaSisMensual = null;
    let datosFiltradosSis = [...sisResultados];

    function fmt(n) {
        return Number(n || 0).toLocaleString("es-MX");
    }

    /* ===============================
        AGRUPAR POR AÑO + UNIDAD
     ================================*/
    function agruparPorAnioUnidad(data) {
        const mapa = {};

        data.forEach(r => {
            const key = `${r.anio}-${r.clues}`;

            if (!mapa[key]) {
                mapa[key] = {
                    anio: r.anio,
                    clues: r.clues,
                    nombre_unidad: r.nombre_unidad,

                    // CONSULTAS
                    consultas: 0,
                    especialidad: 0,
                    mental: 0,
                    bucal: 0,
                    medicas: 0,
                    no_medicas: 0,

                    // ESTUDIOS
                    laboratorio: 0,
                    rayosx: 0,
                    anatomia: 0,
                    electro: 0,
                    encefa: 0,
                    ultrasonido: 0,
                    tac: 0,
                    rnm: 0,

                    // DÍAS PACIENTE
                    diasPaciente: 0,
                    med_interna: 0,
                    cirugia: 0,
                    gineco: 0,
                    pediatria: 0,
                    otros: 0,
                    psiquiatria: 0
                };
            }

            // CONSULTAS
            mapa[key].consultas += Number(r.consultas) || 0;
            mapa[key].especialidad += Number(r.especialidad) || 0;
            mapa[key].mental += Number(r.mental) || 0;
            mapa[key].bucal += Number(r.bucal) || 0;
            mapa[key].medicas += Number(r.medicas) || 0;
            mapa[key].no_medicas += Number(r.no_medicas) || 0;

            // ESTUDIOS
            mapa[key].laboratorio += Number(r.laboratorio) || 0;
            mapa[key].rayosx += Number(r.rayosx) || 0;
            mapa[key].anatomia += Number(r.anatomia) || 0;
            mapa[key].electro += Number(r.electro) || 0;
            mapa[key].encefa += Number(r.encefa) || 0;
            mapa[key].ultrasonido += Number(r.ultrasonido) || 0;
            mapa[key].tac += Number(r.tac) || 0;
            mapa[key].rnm += Number(r.rnm) || 0;

            // DÍAS PACIENTE
            mapa[key].diasPaciente += Number(r.diasPaciente) || 0;
            mapa[key].med_interna += Number(r.med_interna) || 0;
            mapa[key].cirugia += Number(r.cirugia) || 0;
            mapa[key].gineco += Number(r.gineco) || 0;
            mapa[key].pediatria += Number(r.pediatria) || 0;
            mapa[key].otros += Number(r.otros) || 0;
            mapa[key].psiquiatria += Number(r.psiquiatria) || 0;
        });

        return Object.values(mapa);
    }


    /* ===============================
       TABS POR AÑO
    ================================*/
    function renderTabsAnios(data) {
        const tabs = document.getElementById("tabsAnios");
        tabs.innerHTML = "";

        // 1. Ordenamos de mayor a menor (b - a)
        const anios = [...new Set(data.map(r => r.anio))].sort((a, b) => b - a);

        anios.forEach((anio, i) => {
            const li = document.createElement("li");
            li.className = "nav-item";

            // El index 0 ahora siempre será el año más alto
            li.innerHTML = `
            <button class="nav-link ${i === 0 ? 'active' : ''}">
                ${anio}
            </button>
        `;

            li.querySelector("button").addEventListener("click", () => {
                document.querySelectorAll("#tabsAnios .nav-link")
                    .forEach(b => b.classList.remove("active"));

                li.querySelector("button").classList.add("active");

                // Actualizamos el año activo al hacer click
                anioActivo = anio;
                paginaActual = 1;

                // Renderizamos con el nuevo año seleccionado
                renderTablaSis(datosActuales);
                renderGraficaPorUnidad(
                    datosActuales.filter(r => r.anio === anioActivo)
                );
            });

            tabs.appendChild(li);
        });

        // 2. IMPORTANTE: Inicializamos anioActivo con el año más alto (posición 0)
        // para que la primera carga coincida con la pestaña "active"
        if (anios.length > 0) {
            anioActivo = anios[0];
        }
    }

    /* ===============================
       TABLA + PAGINACIÓN
    ================================*/
    function renderTablaSis() {
        actualizarEncabezadoSIS(anioActivo);

        const tbody = document.getElementById("tablaSIS");
        const thead = document.querySelector("#tablaResultados thead tr");
        const paginacion = document.getElementById("paginacionTabla");

        tbody.innerHTML = "";
        paginacion.innerHTML = "";

        const indicador = document.getElementById("filtroIndicador")?.value || "sis";

        const datosFiltrados = datosActuales.filter(r => r.anio === anioActivo);

        const inicio = (paginaActual - 1) * FILAS_POR_PAGINA;
        const paginaDatos = datosFiltrados.slice(inicio, inicio + FILAS_POR_PAGINA);

        let columnas = ["Año", "CLUES", "Unidad"];

        if (indicador === "sis") {
            columnas.push("Consultas", "Especialidad", "Mental", "Bucal", "Médicas", "Días paciente", "No médicas");
        } else if (indicador === "estudios") {
            columnas.push("Laboratorio", "Rayos X", "Anatomía", "Electrocardiograma", "Encefalograma", "Ultrasonidos", "TAC", "RNM");
        } else if (indicador === "diaspaciente") {
            columnas.push("Med. Interna", "Cirugía", "Gineco", "Pediatría", "Otros", "Psiquiatría");
        }

        // ============================
        // 🔹 ENCABEZADOS CENTRADOS (excepto CLUES y Unidad para mejor lectura)
        // ============================
        thead.innerHTML = columnas.map((c, index) => {
            // Centramos Año (index 0) y todas las métricas (index >= 3)
            const clase = (index === 0 || index >= 3) ? 'class="text-center"' : '';
            return `<th ${clase}>${c}</th>`;
        }).join("");

        // ============================
        // 🔹 FILAS CON VALORES CENTRADOS
        // ============================
        paginaDatos.forEach(r => {
            // Año centrado, CLUES y Unidad a la izquierda
            let fila = `
            <td class="text-center">${r.anio}</td>
            <td>${r.clues}</td>
            <td>${r.nombre_unidad}</td>
        `;

            if (indicador === "sis") {
                fila += `
                <td class="text-center">${fmt(r.consultas)}</td>
                <td class="text-center">${fmt(r.especialidad)}</td>
                <td class="text-center">${fmt(r.mental)}</td>
                <td class="text-center">${fmt(r.bucal)}</td>
                <td class="text-center">${fmt(r.medicas)}</td>
                <td class="text-center">${fmt(r.diasPaciente)}</td>
                <td class="text-center">${fmt(r.no_medicas)}</td>
            `;
            }
            else if (indicador === "estudios") {
                fila += `
                <td class="text-center">${fmt(r.laboratorio)}</td>
                <td class="text-center">${fmt(r.rayosx)}</td>
                <td class="text-center">${fmt(r.anatomia)}</td>
                <td class="text-center">${fmt(r.electro)}</td>
                <td class="text-center">${fmt(r.encefa)}</td>
                <td class="text-center">${fmt(r.ultrasonido)}</td>
                <td class="text-center">${fmt(r.tac)}</td>
                <td class="text-center">${fmt(r.rnm)}</td>
            `;
            }
            else if (indicador === "diaspaciente") {
                fila += `
                <td class="text-center">${fmt(r.med_interna)}</td>
                <td class="text-center">${fmt(r.cirugia)}</td>
                <td class="text-center">${fmt(r.gineco)}</td>
                <td class="text-center">${fmt(r.pediatria)}</td>
                <td class="text-center">${fmt(r.otros)}</td>
                <td class="text-center">${fmt(r.psiquiatria)}</td>
            `;
            }

            tbody.innerHTML += `<tr>${fila}</tr>`;
        });

        // ... (El resto del código de paginación se mantiene igual)

        const totalPaginas = Math.ceil(datosFiltrados.length / FILAS_POR_PAGINA);
        for (let i = 1; i <= totalPaginas; i++) {
            const li = document.createElement("li");
            li.className = `page-item ${i === paginaActual ? "active" : ""}`;
            li.innerHTML = `<button class="page-link">${i}</button>`;
            li.onclick = () => {
                paginaActual = i;
                renderTablaSis();
            };
            paginacion.appendChild(li);

        }
    }

    /* ===============================
       GRÁFICA POR AÑO (CONSULTAS)
    ================================*/
    function renderGraficaPorAnio(data) {

        const porAnio = {};

        data.forEach(r => {
            porAnio[r.anio] = (porAnio[r.anio] || 0) + (Number(r.consultas) || 0);
        });

        const anios = Object.keys(porAnio).sort();

        const colores = [
            '#4E79A7', '#59A14F', '#F28E2B',
            '#E15759', '#76B7B2', '#EDC948',
            '#B07AA1', '#FF9DA7'
        ];

        //UN DATASET POR AÑO
        const datasets = anios.map((anio, i) => ({
            label: `Año ${anio}`,
            data: anios.map(a => a === anio ? porAnio[anio] : 0),
            backgroundColor: colores[i % colores.length]
        }));

        if (graficaAnio) graficaAnio.destroy();

        graficaAnio = new Chart(
            document.getElementById('graficaSisPorAnio'),
            {
                type: 'bar',
                data: {
                    labels: anios,
                    datasets
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { stacked: true },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: v => Number(v).toLocaleString("es-MX")
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top'
                        },
                        tooltip: {
                            displayColors: false,
                            callbacks: {

                                //TÍTULO
                                title: function (items) {
                                    return items[0].dataset.label;
                                },

                                //CONTENIDO
                                label: function (context) {
                                    const valor = Number(context.raw).toLocaleString("es-MX");
                                    return `Total: ${valor}`;
                                }
                            }
                        }
                    }
                }
            }
        );
    }



    /* ===============================
       GRÁFICA POR UNIDAD
    ================================*/

    function totalEstudiosUnidad(r) {
        return (
            (r.rayosx || 0) +
            (r.anatomia || 0) +
            (r.electro || 0) +
            (r.ultrasonido || 0) +
            (r.tac || 0) +
            (r.rnm || 0)
        );
    }


    function renderGraficaPorUnidad(data) {

        const unidadesSeleccionadas = window.getUnidadesSeleccionadas?.() || [];

        let labels = [];
        let datasetsData = {
            laboratorio: [],
            rayosx: [],
            anatomia: [],
            electro: [],
            ultrasonido: [],
            tac: [],
            rnm: []
        };

        // 🔹 CASO 1: TOTAL GENERAL (inicio)
        if (unidadesSeleccionadas.length === 0) {

            labels = ['Total General'];


            datasetsData.rayosx = [
                data.reduce((s, r) => s + (r.rayosx || 0), 0)
            ];
            datasetsData.anatomia = [
                data.reduce((s, r) => s + (r.anatomia || 0), 0)
            ];
            datasetsData.electro = [
                data.reduce((s, r) => s + (r.electro || 0), 0)
            ];
            datasetsData.ultrasonido = [
                data.reduce((s, r) => s + (r.ultrasonido || 0), 0)
            ];
            datasetsData.tac = [
                data.reduce((s, r) => s + (r.tac || 0), 0)
            ];
            datasetsData.rnm = [
                data.reduce((s, r) => s + (r.rnm || 0), 0)
            ];

        }
        // 🔹 CASO 2: UNIDADES SELECCIONADAS
        else {

            const datosFiltrados = data.filter(r =>
                unidadesSeleccionadas.includes(r.nombre_unidad)
            );

            labels = datosFiltrados.map(r => r.nombre_unidad);


            datasetsData.rayosx = datosFiltrados.map(r => r.rayosx || 0);
            datasetsData.anatomia = datosFiltrados.map(r => r.anatomia || 0);
            datasetsData.electro = datosFiltrados.map(r => r.electro || 0);
            datasetsData.ultrasonido = datosFiltrados.map(r => r.ultrasonido || 0);
            datasetsData.tac = datosFiltrados.map(r => r.tac || 0);
            datasetsData.rnm = datosFiltrados.map(r => r.rnm || 0);
        }

        if (graficaUnidad) graficaUnidad.destroy();

        const elTitulo = document.getElementById("tituloGraficaSis");
        if (elTitulo) {
            elTitulo.innerHTML = `Estudios de Gabinete <strong>${anioActivo}</strong>`;
        }


        graficaUnidad = new Chart(
            document.getElementById('graficaSis'),
            {
                type: 'bar',
                data: {
                    labels,
                    datasets: [

                        { label: 'Rayos X', data: datasetsData.rayosx },
                        { label: 'Anatomía', data: datasetsData.anatomia },
                        { label: 'Electrocardiograma', data: datasetsData.electro },
                        { label: 'Ultrasonido', data: datasetsData.ultrasonido },
                        { label: 'TAC', data: datasetsData.tac },
                        { label: 'RNM', data: datasetsData.rnm }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: {
                        x: {
                            stacked: true,
                            ticks: {
                                callback: value => Number(value).toLocaleString("es-MX")
                            }
                        },
                        y: {
                            stacked: true
                        }
                    },

                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.x !== null) {
                                        // Formateamos el valor individual con es-MX
                                        label += Number(context.parsed.x).toLocaleString("es-MX");
                                    }
                                    return label;
                                },

                                footer: function (items) {

                                    let sumaGabinete = 0;
                                    const chart = items[0].chart;
                                    const dataIndex = items[0].dataIndex;
                                    chart.data.datasets.forEach((dataset) => {
                                        const valor = dataset.data[dataIndex] || 0;
                                        sumaGabinete += valor;
                                    });

                                    // Retornamos el texto con el nombre "Estudios de Gabinete"
                                    return `Estudios de Gabinete: ${sumaGabinete.toLocaleString("es-MX")}`;
                                }
                            }
                        }
                    }

                }

            }
        );
    }



    /* ===============================
    GRÁFICA DE LINEAS DEBAJO TABLA
 ================================*/


    function cargarDetalleSis(indicador) {

        const select = document.getElementById("filtroSisDetalle");
        if (!select) return;

        select.innerHTML = "";

        let opciones = [];

        if (indicador === "sis") {
            opciones = [
                { value: "consultas", text: "Consultas" },
                { value: "especialidad", text: "Especialidad" },
                { value: "mental", text: "Salud mental" },
                { value: "bucal", text: "Salud bucal" },
                { value: "medicas", text: "Consultas médicas" },
                { value: "no_medicas", text: "Consultas no médicas" }
            ];
        }
        else if (indicador === "estudios") {
            opciones = [
                { value: "laboratorio", text: "Laboratorio" },
                { value: "rayosx", text: "Rayos X" },
                { value: "anatomia", text: "Anatomía" },
                { value: "electro", text: "Electrocardiograma" },
                { value: "encefa", text: "Encefalograma" },
                { value: "ultrasonido", text: "Ultrasonido" },
                { value: "tac", text: "TAC" },
                { value: "rnm", text: "RNM" }
            ];
        }
        else if (indicador === "diaspaciente") {
            opciones = [
                { value: "diasPaciente", text: "Días paciente" },
                { value: "med_interna", text: "Medicina interna" },
                { value: "cirugia", text: "Cirugía" },
                { value: "gineco", text: "Ginecología" },
                { value: "pediatria", text: "Pediatría" },
                { value: "otros", text: "Otros" },
                { value: "psiquiatria", text: "Psiquiatría" }
            ];
        }

        opciones.forEach(op => {
            const option = document.createElement("option");
            option.value = op.value;
            option.textContent = op.text;
            select.appendChild(option);
        });
    }


    function graficaSisPorMes(data) {
        const detalle = document.getElementById("filtroSisDetalle")?.value;

        if (!data || data.length === 0) {
            if (graficaSisMensual) graficaSisMensual.destroy();
            return;
        }

        const mesesNombres = {
            1: "Enero", 2: "Febrero", 3: "Marzo", 4: "Abril",
            5: "Mayo", 6: "Junio", 7: "Julio", 8: "Agosto",
            9: "Septiembre", 10: "Octubre", 11: "Noviembre", 12: "Diciembre"
        };

        const meses = Array.from({ length: 12 }, (_, i) => i + 1);
        const labels = meses.map(m => mesesNombres[m]);

        // 🔹 Capturar todos los años seleccionados
        const aniosSeleccionados = [...document.querySelectorAll(".sis-filtro-anio:checked")]
            .map(cb => Number(cb.value));

        const resumen = {};

        data
            .filter(r => aniosSeleccionados.length === 0 || aniosSeleccionados.includes(r.anio))
            .forEach(r => {
                if (!r.mes) return;

                const mes = Number(r.mes);
                const anio = r.anio;

                let valor = 0;
                if (detalle && r[detalle] !== undefined) {
                    valor = Number(r[detalle]) || 0;
                }

                const key = `Total ${anio}`;

                if (!resumen[key]) resumen[key] = {};
                resumen[key][mes] = (resumen[key][mes] || 0) + valor;
            });

        const datasets = Object.keys(resumen).map(key => ({
            label: key,
            data: meses.map(m => resumen[key][m] || 0),
            tension: 0.35,
            pointRadius: 4,
            fill: false
        }));

        if (graficaSisMensual) graficaSisMensual.destroy();

        graficaSisMensual = new Chart(
            document.getElementById("graficaSisMensual"),
            {
                type: "line",
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) {
                                    return Number(value).toLocaleString("es-MX");
                                }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {

                                // 🟦 TÍTULO: Mes + Año
                                title: function (items) {
                                    const mes = items[0].label;                // Enero
                                    const anio = items[0].dataset.label.replace("Total ", "");
                                    return `${mes} ${anio}`;
                                },

                                // 🟩 CONTENIDO
                                label: function (context) {
                                    const valor = Number(context.raw).toLocaleString("es-MX");
                                    return `Total: ${valor}`;
                                }
                            }
                        }
                    }
                }
            }
        );

    }


    /* ===============================
       FILTROS
    ================================*/
    document.getElementById("btnFiltrarSis")?.addEventListener("click", () => {

        const anios = [...document.querySelectorAll(".sis-filtro-anio:checked")]
            .map(cb => Number(cb.value));

        const meses = [...document.querySelectorAll(".sis-filtro-mes:checked")]
            .map(cb => Number(cb.value));

        const unidades = window.getUnidadesSeleccionadas?.() || [];

        const filtrados = sisResultados.filter(r =>
            (anios.length === 0 || anios.includes(r.anio)) &&
            (meses.length === 0 || meses.includes(r.mes)) &&
            (unidades.length === 0 || unidades.includes(r.nombre_unidad))
        );

        // 🔹 TABLA + GRAFICAS SUPERIORES (agrupadas)
        datosActuales = agruparPorAnioUnidad(filtrados);
        paginaActual = 1;

        renderTabsAnios(datosActuales);
        renderTablaSis();
        renderGraficaPorAnio(datosActuales);
        renderGraficaPorUnidad(
            datosActuales.filter(r => r.anio === anioActivo)
        );


        if (
            anios.length === 0 &&
            meses.length === 0 &&
            unidades.length === 0
        ) {

            datosFiltradosSis = [...sisResultados];


            const aniosDisponibles = [
                ...new Set(datosFiltradosSis.map(r => r.anio))
            ].sort();

            anioActivo = aniosDisponibles[0];

            const selectDetalle = document.getElementById("filtroSisDetalle");
            if (selectDetalle) selectDetalle.selectedIndex = 0;

        } else {
            datosFiltradosSis = filtrados;
        }

        graficaSisPorMes(datosFiltradosSis);

    });

    /* ===============================
     CARGA INICIAL
  ===============================*/
    datosActuales = agruparPorAnioUnidad(sisResultados);

    renderTabsAnios(datosActuales);
    renderTablaSis();
    renderGraficaPorAnio(datosActuales);
    renderGraficaPorUnidad(
        datosActuales.filter(r => r.anio === anioActivo)
    );

    // 🔹 cargar select secundario
    cargarDetalleSis(
        document.getElementById("filtroIndicador").value
    );

    // 🔹 gráfica mensual
    datosFiltradosSis = [...sisResultados];
    graficaSisPorMes(datosFiltradosSis);


    // 🔹 cuando cambia indicador principal
    document.getElementById("filtroIndicador")
        .addEventListener("change", function () {

            cargarDetalleSis(this.value);

            const aniosDisponibles = [
                ...new Set(datosFiltradosSis.map(r => r.anio))
            ].sort();

            anioActivo = aniosDisponibles[0];

            graficaSisPorMes(datosFiltradosSis);

        });

    // 🔹 cuando cambia el select interno de la gráfica
    document.getElementById("filtroSisDetalle")
        ?.addEventListener("change", () => {
            graficaSisPorMes(datosFiltradosSis);

        });

</script>
{% endblock %}
