        function navegarYDesplegar(collapseId, numeroPagina, nombreSeccion) {
            // 1. Saltar a la página
            $('#flipbook').turn('page', numeroPagina);

            // 2. Cambiar el título dinámico
            $('#tituloVisualizador').text(nombreSeccion);

            // 3. Desplegar acordeón
            const el = document.getElementById(collapseId);
            if (el) {
                const bsCollapse = bootstrap.Collapse.getOrCreateInstance(el);
                bsCollapse.toggle();
            }
        }

        // Asegúrate de que el visor sepa qué imágenes puede abrir
        let viewer = null;

        function inicializarVisor() {
            // Apuntamos al contenedor donde están tus hojas (.page img)
            const gallery = document.getElementById('flipbook');

            // Configuración profesional: Arrastre, Zoom con rueda, rotación
            viewer = new Viewer(gallery, {
                inline: false,
                viewed() {
                    viewer.zoomTo(1); // Zoom inicial normal
                },
                navbar: false, // Ocultar miniaturas inferiores
                toolbar: {
                    zoomIn: 1,
                    zoomOut: 1,
                    oneToOne: 1,
                    reset: 1,
                    prev: 0,
                    next: 0,
                    rotateLeft: 1,
                    rotateRight: 1,
                }
            });
        }

                <ul class="list-unstyled">${generarLinks(config, archivosOrdenados)}</ul>

                // La función ahora recibe el objeto config completo de forma segura
                // Cambia la definición de la función para que acepte el array de archivos
                function generarLinks(config, listaArchivos) {
                    let rango = config.rango;
                    let etiqueta = config.label || "Hoja";
                    let links = "";

                    for (let i = rango[0]; i <= rango[1]; i++) {
                        let nombreArchivo = listaArchivos[i]; // Ahora usa el parámetro
                        if (nombreArchivo) {
                            let titulo = (typeof titulosHojas !== 'undefined' && titulosHojas[nombreArchivo])
                                ? titulosHojas[nombreArchivo]
                                : `${etiqueta} ${i - rango[0] + 1}`;

                            // Escapamos las comillas simples para que el string no se rompa
                            let tituloLimpio = titulo.replace(/'/g, "\\'");

                            links += `<li>
                <a href="#" class="text-info text-decoration-none" 
                   onclick="$('#flipbook').turn('page', ${i + 2}); $('#tituloVisualizador').text('${tituloLimpio}'); return false;">
                    ${titulo}
                </a>
            </li>`;
                        }
                    }
                    return links;
                }

                function ajustarFlipbook() {

                    const container = document.getElementById("flipbook-container");

                    const newWidth = container.clientWidth;
                    const newHeight = newWidth * 1.3;

                    $('#flipbook').turn("size", newWidth, newHeight);
                }

                // 6. Inicializar Turn.js
                const portada = new Image();

                portada.src = "/static/img/portada_ok.webp";

                portada.onload = function () {

                    const container = document.getElementById("flipbook-container");
                    const containerWidth = container.clientWidth;
                    const calculatedHeight = containerWidth * 1.3;

                    flipbook.turn({
                        width: containerWidth,
                        height: calculatedHeight,
                        autoCenter: true,
                        display: 'single',
                        acceleration: true,
                        gradients: false,
                        elevation: 50,
                        pages: archivos.length + 1
                    });

                    flipbook.bind('turning', function (event, page) {

                        let indice = page - 2;
                        let archivo = archivosOrdenados[indice];

                        // PORTADA
                        if (page === 1) {
                            $('#tituloVisualizador').text("SALUD CON GRANDEZA: COMPROMISO DE TODOS.");
                            return;
                        }

                        // HOJAS
                        if (archivo && titulosHojas[archivo]) {
                            $('#tituloVisualizador').text(titulosHojas[archivo]);
                            return;
                        }

                        // SECCIONES
                        if (titulosSecciones[page]) {
                            $('#tituloVisualizador').text(titulosSecciones[page]);
                            return;
                        }

                        $('#tituloVisualizador').text(`Página ${page}`);
                    });

                    // Mostrar flipbook ya cargado
                    document.getElementById("flipbook").classList.add("ready");

                    window.addEventListener("resize", ajustarFlipbook);

                    // =========================
                    // BOTÓN SIGUIENTE
                    // =========================
                    $('#btn-next').off('click').on('click', function () {

                        let paginaActual = $('#flipbook').turn('page');
                        let totalPaginas = $('#flipbook').turn('pages');

                        if (paginaActual < totalPaginas) {
                            $('#flipbook').turn('next');
                        }

                    });

                    // =========================
                    // BOTÓN ANTERIOR
                    // =========================
                    $('#btn-prev').off('click').on('click', function () {

                        let paginaActual = $('#flipbook').turn('page');

                        if (paginaActual > 1) {
                            $('#flipbook').turn('previous');
                        }

                    });

                    // =========================
                    // BOTÓN PORTADA
                    // =========================
                    $('#btn-start').off('click').on('click', function () {

                        indiceActual = 0;

                        flipbook.turn('page', 1);

                    });

                };
            }


            // Navegación con flechas del teclado
            $(document).keydown(function (e) {
                switch (e.keyCode) {
                    case 37: // Flecha Izquierda
                        $('#flipbook').turn('previous');
                        break;
                    case 39: // Flecha Derecha
                        $('#flipbook').turn('next');
                        break;
                }
            });



            // Borra la función vieja y usa esta lógica de delegación
            $(document).on('click', '.page img', function (e) {
                e.preventDefault();

                const imgSrc = $(this).attr('src');
                const imgTemp = new Image();
                imgTemp.src = imgSrc;

                const viewer = new Viewer(imgTemp, {
                    inline: false,
                    button: true,
                    navbar: false,
                    title: false,
                    toolbar: true,
                    tooltip: false,
                    transition: false,
                    // 1. Evitamos que el usuario haga un zoom infinito que rompa la vista
                    minZoomRatio: 0.1,
                    maxZoomRatio: 5,

                    viewed() {
                        // 2. FORZAR "FIT": Esto hace que la imagen se adapte al tamaño 
                        // de la pantalla del usuario apenas abre, sin importar la resolución.
                        viewer.zoomTo(viewer.imageData.ratio);

                        // Si aun así la sientes muy grande, puedes probar un valor fijo como:
                        // viewer.zoomTo(0.5); 
                    },
                    hidden() {
                        viewer.destroy();
                    }
                });

                viewer.show();
            });

            // Buscador dinámico con filtrado en tiempo real
            $('#buscadorHojas').on('input', function () {
                let valor = $(this).val().toLowerCase();

                // --- NUEVA LÓGICA DE RESET ---
                if (valor === "") {
                    // 1. Cerramos todos los acordeones usando la API de Bootstrap
                    $('.accordion-collapse').removeClass('show');
                    $('.accordion-button').addClass('collapsed').attr('aria-expanded', 'false');

                    // 2. Mostramos todos los ítems y las listas que pudieron ocultarse
                    $(".accordion-item, .accordion-body li").show();
                    return; // Detenemos la ejecución aquí
                }
                // -----------------------------

                // Tu lógica actual de filtrado (se ejecuta solo si hay texto)
                $(".accordion-item").each(function () {
                    let $item = $(this);
                    let textoSeccion = $item.find('.accordion-button').text().toLowerCase();
                    let $listaHojas = $item.find('li');

                    let hayCoincidenciaEnHojas = false;
                    $listaHojas.each(function () {
                        let textoHoja = $(this).text().toLowerCase();
                        if (textoHoja.indexOf(valor) > -1) {
                            $(this).show();
                            hayCoincidenciaEnHojas = true;
                        } else {
                            $(this).hide();
                        }
                    });

                    if (textoSeccion.indexOf(valor) > -1 || hayCoincidenciaEnHojas) {
                        $item.show();
                        // Al buscar, forzamos la apertura
                        $item.find('.accordion-collapse').addClass('show');
                        $item.find('.accordion-button').removeClass('collapsed').attr('aria-expanded', 'true');
                    } else {
                        $item.hide();
                    }
                });
            });


            window.addEventListener("scroll", function () {
                const footer = document.getElementById("footer");

                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
                    footer.classList.add("footer-visible");
                } else {
                    footer.classList.remove("footer-visible");
                }
            });

        });
    </script>



    </div>


</body>
